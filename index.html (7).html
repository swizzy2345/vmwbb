<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VMW Bank</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #dde3ef; font-family: -apple-system, 'SF Pro Display', 'Segoe UI', sans-serif; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes float {
      0%,100% { transform: translateY(0px) rotate(-2deg); }
      50%      { transform: translateY(-12px) rotate(2deg); }
    }
    @keyframes floatB {
      0%,100% { transform: translateY(0px) rotate(3deg); }
      50%      { transform: translateY(-8px) rotate(-3deg); }
    }
    @keyframes slideLeft {
      from { opacity: 0; transform: translateX(40px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulse {
      0%,100% { opacity: 0.6; transform: scale(1); }
      50%      { opacity: 1; transform: scale(1.04); }
    }
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .auth-input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1.5px solid #e5e7eb;
      background: #f9fafb;
      font-size: 15px;
      font-family: 'DM Sans', sans-serif;
      color: #111827;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .auth-input:focus {
      border-color: #1A3A6E;
      box-shadow: 0 0 0 3px rgba(26,58,110,0.08);
      background: #fff;
    }
    .auth-input::placeholder { color: #9ca3af; }
    .auth-btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #0F2550, #1A3A6E);
      color: #fff;
      border: none;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(26,58,110,0.3);
      letter-spacing: 0.2px;
    }
    .auth-btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(26,58,110,0.38); }
    .auth-btn-primary:active { transform: translateY(0); }
    .auth-btn-outline {
      width: 100%;
      padding: 14px;
      background: transparent;
      color: #1A3A6E;
      border: 1.5px solid #1A3A6E;
      border-radius: 16px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
    }
    .auth-btn-outline:hover { background: rgba(26,58,110,0.04); }
    .social-btn {
      flex: 1;
      padding: 12px;
      background: #f5f6f8;
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .social-btn:hover { background: #eef0f4; transform: translateY(-1px); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const receiveAccounts = {
      usd: { label: 'USD Account', mainInfo: '0012484821', subInfo: 'VMW Bank · John Doe',
        details: [{ l: 'Account Name', v: 'John Doe' }, { l: 'Account Number', v: '0012484821' }, { l: 'Bank', v: 'VMW Bank' }, { l: 'Routing', v: '021000021' }, { l: 'Currency', v: 'USD' }] },
      ngn: { label: 'NGN Account', mainInfo: '7701234703', subInfo: 'VMW Bank · John Doe',
        details: [{ l: 'Account Name', v: 'John Doe' }, { l: 'Account Number', v: '7701234703' }, { l: 'Bank', v: 'VMW Bank' }, { l: 'Currency', v: 'NGN (Naira)' }] }
    };
    const cryptoNetworks = {
      usdc: { token: 'USDC — USD Coin', networks: [
        { name: 'Ethereum (ERC-20)', badge: '#E6F1FB', badgeColor: '#185FA5', address: '0x4f3B8a9C2d1E5F7b3A6c8d2E...a72C' },
        { name: 'Polygon (MATIC)', badge: '#EEEDFE', badgeColor: '#534AB7', address: '0x7a1C2d9F3b4E5f6A8c9D...b83E' },
        { name: 'Binance Smart Chain (BEP-20)', badge: '#FAEEDA', badgeColor: '#854F0B', address: '0xBc1A3f7E2d4C5b6a9F0e...c12D' },
        { name: 'Solana (SPL)', badge: '#EAF3DE', badgeColor: '#3B6D11', address: 'So11GkPQx7c3A9mN4vTz...e57K' }
      ]},
      usdt: { token: 'USDT — Tether', networks: [
        { name: 'Tron (TRC-20)', badge: '#EAF3DE', badgeColor: '#3B6D11', address: 'TQn7Fb3KmR9pLw2vX8dYz...8zRk' },
        { name: 'Ethereum (ERC-20)', badge: '#E6F1FB', badgeColor: '#185FA5', address: '0x9dF2A5c8B1e3F7b4C6a...d94B' },
        { name: 'Binance Smart Chain (BEP-20)', badge: '#FAEEDA', badgeColor: '#854F0B', address: '0xEa4B3c7F2d9A1b5C8e0f...a73C' },
        { name: 'Polygon (MATIC)', badge: '#EEEDFE', badgeColor: '#534AB7', address: '0x3F8c1a4B9d7E2f5A6b8c...f28A' }
      ]}
    };
    const cryptoSendNetworks = {
      usdc: [
        { name: 'Ethereum (ERC-20)', fee: '~$1.20', short: 'ETH' },
        { name: 'Polygon (MATIC)', fee: '~$0.01', short: 'MATIC' },
        { name: 'Binance Smart Chain (BEP-20)', fee: '~$0.05', short: 'BSC' },
        { name: 'Solana (SPL)', fee: '~$0.00', short: 'SOL' }
      ],
      usdt: [
        { name: 'Tron (TRC-20)', fee: '~$1.00', short: 'TRC-20' },
        { name: 'Ethereum (ERC-20)', fee: '~$1.20', short: 'ETH' },
        { name: 'Binance Smart Chain (BEP-20)', fee: '~$0.05', short: 'BSC' },
        { name: 'Polygon (MATIC)', fee: '~$0.01', short: 'MATIC' }
      ]
    };
    const nigerianBanks = ['Access Bank','Citibank Nigeria','Ecobank','Fidelity Bank','First Bank of Nigeria','First City Monument Bank (FCMB)','Globus Bank','GTBank (Guaranty Trust)','Heritage Bank','Jaiz Bank','Keystone Bank','Kuda Bank','Moniepoint','OPay','Palmpay','Polaris Bank','Providus Bank','Stanbic IBTC Bank','Standard Chartered','Sterling Bank','SunTrust Bank','TAJBank','Titan Trust Bank','UBA (United Bank for Africa)','Union Bank','Unity Bank','VFD Microfinance Bank','Wema Bank','Zenith Bank'];
    const mockNames = { '0234567890': 'Emeka Obi', '0198765432': 'Tunde Adeyemi', '0145678901': 'Ngozi Eze', '0312345678': 'Chidi Nwosu' };
    const beneficiaries = [
      { name: 'Emeka Obi', bank: 'GTBank', acct: '0234567890', initials: 'EO', bg: '#e8edf7', color: '#1A3A6E' },
      { name: 'Tunde Adeyemi', bank: 'Access Bank', acct: '0198765432', initials: 'TA', bg: '#EAF3DE', color: '#3B6D11' },
      { name: 'Ngozi Eze', bank: 'Zenith Bank', acct: '0145678901', initials: 'NE', bg: '#FAEEDA', color: '#854F0B' },
      { name: 'Chidi Nwosu', bank: 'First Bank', acct: '0312345678', initials: 'CN', bg: '#E6F1FB', color: '#185FA5' }
    ];

    function StatusBar({ center }) {
      return (
        <div style={{ padding: '12px 20px 0', display: 'flex', justifyContent: 'space-between', fontSize: 12, color: '#6B7280' }}>
          <span>9:41</span>
          {center && <span style={{ fontWeight: 600, color: '#1A3A6E' }}>{center}</span>}
          <span />
        </div>
      );
    }
    function TopBar({ title, onBack }) {
      return (
        <div style={{ padding: '12px 20px', display: 'flex', alignItems: 'center', gap: 12 }}>
          <div onClick={onBack} style={{ width: 32, height: 32, borderRadius: '50%', border: '0.5px solid #d1d5db', background: '#f5f6f8', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', fontSize: 14 }}>←</div>
          <div style={{ fontSize: 16, fontWeight: 500 }}>{title}</div>
        </div>
      );
    }
    function BottomNav({ active, go }) {
      const items = [{ id: 'home', icon: '🏠', label: 'Home' }, { id: 'wallets', icon: '👛', label: 'Wallets' }, { id: 'cards', icon: '💳', label: 'Cards' }, { id: 'profile', icon: '👤', label: 'Profile' }];
      return (
        <div style={{ position: 'sticky', bottom: 0, background: '#fff', borderTop: '0.5px solid #e5e7eb', display: 'flex', justifyContent: 'space-around', padding: '12px 0 20px' }}>
          {items.map(i => (
            <div key={i.id} onClick={() => go(i.id)} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4, cursor: 'pointer', fontSize: 11, color: active === i.id ? '#1A3A6E' : '#6B7280', minWidth: 60 }}>
              <div style={{ fontSize: 20 }}>{i.icon}</div>{i.label}
            </div>
          ))}
        </div>
      );
    }
    function IRow({ label, value, mono, noBorder, valStyle }) {
      return (
        <div style={{ display: 'flex', justifyContent: 'space-between', padding: '12px 0', borderBottom: noBorder ? 'none' : '0.5px solid #e5e7eb' }}>
          <div style={{ fontSize: 13, color: '#6B7280' }}>{label}</div>
          <div style={{ fontSize: 13, fontWeight: 500, ...(mono ? { fontFamily: 'monospace', fontSize: 11 } : {}), ...valStyle }}>{value}</div>
        </div>
      );
    }
    function TxnItem({ icon, name, date, amount, type, onClick }) {
      return (
        <div onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '12px 0', borderBottom: '0.5px solid #e5e7eb', cursor: 'pointer' }}>
          <div style={{ width: 40, height: 40, borderRadius: 12, background: '#f5f6f8', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 16, flexShrink: 0 }}>{icon}</div>
          <div><div style={{ fontSize: 14, fontWeight: 500 }}>{name}</div><div style={{ fontSize: 12, color: '#6B7280', marginTop: 2 }}>{date}</div></div>
          <div style={{ marginLeft: 'auto', fontSize: 14, fontWeight: 500, color: type === 'cr' ? '#1D9E75' : '#D85A30', whiteSpace: 'nowrap' }}>{amount}</div>
        </div>
      );
    }
    function HeroCard({ gradient, label, amount, sub, actions }) {
      const bg = gradient || 'linear-gradient(135deg,#0F2550,#1A3A6E)';
      return (
        <div style={{ background: bg, borderRadius: 20, padding: 24, color: '#fff', margin: '8px 0 20px' }}>
          <div style={{ fontSize: 12, opacity: 0.8, marginBottom: 4 }}>{label}</div>
          <div style={{ fontSize: 32, fontWeight: 500, marginBottom: sub ? 0 : 16 }}>{amount}</div>
          {sub && <div style={{ fontSize: 12, opacity: 0.8, marginTop: -4, marginBottom: 14 }}>{sub}</div>}
          {actions && (
            <div style={{ display: 'flex', gap: 10 }}>
              {actions.map(a => (
                <div key={a.label} onClick={a.onClick} style={{ flex: 1, background: 'rgba(255,255,255,0.2)', borderRadius: 12, padding: 10, fontSize: 13, fontWeight: 500, cursor: 'pointer', textAlign: 'center' }}>{a.label}</div>
              ))}
            </div>
          )}
        </div>
      );
    }
    function SectionTitle({ children, style }) {
      return <div style={{ fontSize: 13, fontWeight: 500, color: '#6B7280', margin: '20px 0 12px', textTransform: 'uppercase', letterSpacing: 0.5, ...style }}>{children}</div>;
    }
    function PrimaryBtn({ children, onClick, style }) {
      return <button onClick={onClick} style={{ width: '100%', padding: 14, background: '#1A3A6E', color: '#fff', border: 'none', borderRadius: 14, fontSize: 15, fontWeight: 500, cursor: 'pointer', marginTop: 8, ...style }}>{children}</button>;
    }
    function OutlineBtn({ children, onClick, style }) {
      return <button onClick={onClick} style={{ width: '100%', padding: 14, background: 'transparent', color: '#1A3A6E', border: '1.5px solid #1A3A6E', borderRadius: 14, fontSize: 15, fontWeight: 500, cursor: 'pointer', marginTop: 8, ...style }}>{children}</button>;
    }
    function FormGroup({ label, children }) {
      return <div style={{ marginBottom: 16 }}><div style={{ fontSize: 13, color: '#6B7280', marginBottom: 6 }}>{label}</div>{children}</div>;
    }
    function Input({ ...props }) {
      return <input style={{ width: '100%', padding: '12px 14px', borderRadius: 12, border: '0.5px solid #d1d5db', background: '#f5f6f8', color: '#111827', fontSize: 14, fontFamily: 'inherit', outline: 'none', boxSizing: 'border-box' }} {...props} />;
    }
    function Select({ children, ...props }) {
      return <select style={{ width: '100%', padding: '12px 14px', borderRadius: 12, border: '0.5px solid #d1d5db', background: '#f5f6f8', color: '#111827', fontSize: 14, fontFamily: 'inherit' }} {...props}>{children}</select>;
    }
    function Chip({ label, selected, onClick }) {
      return (
        <span onClick={onClick} style={{ display: 'inline-flex', alignItems: 'center', padding: '6px 12px', borderRadius: 20, fontSize: 12, fontWeight: 500, background: selected ? '#e8edf7' : '#f5f6f8', border: selected ? '0.5px solid #1A3A6E' : '0.5px solid #e5e7eb', color: selected ? '#1A3A6E' : '#6B7280', cursor: 'pointer', marginRight: 8, marginBottom: 8 }}>{label}</span>
      );
    }
    function AccountCard({ onClick, children, style }) {
      return <div onClick={onClick} style={{ background: '#f5f6f8', borderRadius: 16, padding: 16, marginBottom: 10, cursor: onClick ? 'pointer' : 'default', border: '0.5px solid #e5e7eb', ...style }}>{children}</div>;
    }
    function Toast({ msg }) {
      return (
        <div style={{ position: 'absolute', top: 20, left: '50%', transform: `translateX(-50%) translateY(${msg ? '0' : '-80px'})`, background: '#1A3A6E', color: '#fff', padding: '10px 20px', borderRadius: 12, fontSize: 13, fontWeight: 500, transition: 'transform 0.3s ease', zIndex: 999, whiteSpace: 'nowrap' }}>{msg}</div>
      );
    }

    function TxnModal({ data, onClose, showToast }) {
      return (
        <div onClick={(e) => { if (e.target === e.currentTarget) onClose(); }} style={{ position: 'absolute', inset: 0, background: 'rgba(0,0,0,0.5)', zIndex: 200, display: 'flex', alignItems: 'flex-end' }}>
          <div style={{ background: '#fff', borderRadius: '24px 24px 0 0', padding: '24px 20px 40px', width: '100%' }}>
            <div style={{ width: 40, height: 4, background: '#e5e7eb', borderRadius: 2, margin: '0 auto 20px' }} />
            <div style={{ display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 }}>
              <div style={{ width: 52, height: 52, borderRadius: 14, background: '#f5f6f8', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 24, flexShrink: 0 }}>{data.icon}</div>
              <div><div style={{ fontSize: 16, fontWeight: 500 }}>{data.name}</div><div style={{ fontSize: 12, color: '#6B7280', marginTop: 2 }}>{data.date}</div></div>
              <div style={{ marginLeft: 'auto', fontSize: 18, fontWeight: 500, color: data.type === 'cr' ? '#1D9E75' : '#D85A30' }}>{data.amount}</div>
            </div>
            <div style={{ background: '#f5f6f8', borderRadius: 14, padding: '4px 14px' }}>
              <IRow label="Reference" value={data.ref} mono />
              <IRow label="From" value={data.from} />
              <IRow label="To" value={data.to} />
              <IRow label="Status" value={data.status} noBorder valStyle={{ color: '#1D9E75' }} />
            </div>
            <OutlineBtn onClick={() => { showToast('Receipt shared!'); onClose(); }}>Share Receipt</OutlineBtn>
          </div>
        </div>
      );
    }

    function BalanceCarousel({ go, bal, balancesVisible, setBalancesVisible }) {
      const [slide, setSlide] = React.useState(0);
      const [dragStart, setDragStart] = React.useState(null);
      const slides = [
        { id: 'ngn-account', label: 'NGN Account', amount: bal('₦1,850,000'), sub: bal('≈ $1,171.52 USD'), gradient: 'linear-gradient(135deg,#0A1E42,#1A3A6E,#2B5199)', icon: '₦', actions: [{ label: 'Swap', id: 'swap' }, { label: 'Receive', id: 'receive' }, { label: 'Transfer', id: 'ngn-transfer' }] },
        { id: 'usd-account', label: 'USD Account', amount: bal('$2,450.00'), sub: 'Available balance', gradient: 'linear-gradient(135deg,#0F2550,#1A3A6E,#2B5199)', icon: '$', actions: [{ label: 'Swap', id: 'swap' }, { label: 'Receive', id: 'receive' }, { label: 'Fund', id: 'topup' }] },
        { id: 'usdc-account', label: 'USDC Wallet', amount: bal('$1,200.00'), sub: 'USD Coin', gradient: 'linear-gradient(135deg,#0D3B6E,#185FA5,#378ADD)', icon: '◎', actions: [{ label: 'Swap', id: 'swap' }, { label: 'Receive', id: 'receive' }, { label: 'Transfer', id: 'usdc-transfer' }] },
        { id: 'usdt-account', label: 'USDT Wallet', amount: bal('$370.50'), sub: 'Tether', gradient: 'linear-gradient(135deg,#1B3A0A,#3B6D11,#5FA018)', icon: '₮', actions: [{ label: 'Swap', id: 'swap' }, { label: 'Receive', id: 'receive' }, { label: 'Transfer', id: 'usdt-transfer' }] },
      ];
      const s = slides[slide];
      const prev = () => setSlide(i => Math.max(0, i - 1));
      const next = () => setSlide(i => Math.min(slides.length - 1, i + 1));
      const onTouchStart = e => setDragStart(e.touches[0].clientX);
      const onTouchEnd = e => { if (dragStart === null) return; const dx = e.changedTouches[0].clientX - dragStart; if (dx < -40) next(); else if (dx > 40) prev(); setDragStart(null); };
      const onMouseDown = e => setDragStart(e.clientX);
      const onMouseUp = e => { if (dragStart === null) return; const dx = e.clientX - dragStart; if (dx < -40) next(); else if (dx > 40) prev(); setDragStart(null); };
      return (
        <div style={{ margin: '8px 0 16px', userSelect: 'none' }}>
          <div
            style={{ background: s.gradient, borderRadius: 20, padding: '20px 22px 18px', color: '#fff', position: 'relative', overflow: 'hidden', cursor: 'grab' }}
            onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}
            onMouseDown={onMouseDown} onMouseUp={onMouseUp}
            onClick={() => go(s.id)}
          >
            {/* Decorative circles */}
            <div style={{ position: 'absolute', top: -40, right: -40, width: 160, height: 160, borderRadius: '50%', background: 'rgba(255,255,255,0.06)', pointerEvents: 'none' }} />
            <div style={{ position: 'absolute', bottom: -20, left: -20, width: 100, height: 100, borderRadius: '50%', background: 'rgba(255,255,255,0.05)', pointerEvents: 'none' }} />
            {/* Top row */}
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 12, position: 'relative' }}>
              <div>
                <div style={{ fontSize: 11, opacity: 0.75, letterSpacing: 0.5, marginBottom: 2 }}>{s.label}</div>
                <div style={{ fontSize: 30, fontWeight: 600, lineHeight: 1.1 }}>{s.amount}</div>
                <div style={{ fontSize: 12, opacity: 0.7, marginTop: 3 }}>{s.sub}</div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 6 }}>
                <button onClick={e => { e.stopPropagation(); setBalancesVisible(v => !v); }} style={{ background: 'rgba(255,255,255,0.18)', border: 'none', color: '#fff', width: 28, height: 28, borderRadius: 8, cursor: 'pointer', fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{balancesVisible ? '👁' : '🙈'}</button>
              </div>
            </div>
            {/* Action buttons */}
            <div style={{ display: 'flex', gap: 8, position: 'relative' }}>
              {s.actions.map(a => (
                <div key={a.label} onClick={e => { e.stopPropagation(); go(a.id); }} style={{ flex: 1, background: 'rgba(255,255,255,0.2)', borderRadius: 10, padding: '8px 4px', fontSize: 12, fontWeight: 500, cursor: 'pointer', textAlign: 'center' }}>{a.label}</div>
              ))}
            </div>
          </div>
          {/* Dot indicators + slide count */}
          <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 6, marginTop: 10 }}>
            {slides.map((_, i) => (
              <div key={i} onClick={() => setSlide(i)} style={{ width: i === slide ? 20 : 7, height: 7, borderRadius: 4, background: i === slide ? '#1A3A6E' : '#cbd5e1', transition: 'all 0.3s', cursor: 'pointer' }} />
            ))}
          </div>
          <div style={{ textAlign: 'center', fontSize: 10, color: '#9ca3af', marginTop: 4 }}>Swipe to see all accounts</div>
        </div>
      );
    }

    /* ─── COLLAPSIBLE TRANSACTION GROUP ─── */
    function TxnGroup({ icon, label, bg, color, items, setTxnModal }) {
      const [open, setOpen] = useState(true);
      return (
        <div style={{ marginBottom: 4 }}>
          {/* Header row — tap to collapse */}
          <div
            onClick={() => setOpen(o => !o)}
            style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '10px 12px', borderRadius: 12, background: open ? bg : '#f5f6f8', border: `0.5px solid ${open ? color + '44' : '#e5e7eb'}`, cursor: 'pointer', marginBottom: open ? 0 : 4, transition: 'background 0.2s' }}
          >
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <div style={{ width: 26, height: 26, borderRadius: 8, background: open ? color : '#e5e7eb', color: open ? '#fff' : '#9ca3af', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, transition: 'background 0.2s' }}>{icon}</div>
              <span style={{ fontSize: 12, fontWeight: 700, color: open ? color : '#6B7280', textTransform: 'uppercase', letterSpacing: 0.6, transition: 'color 0.2s' }}>{label}</span>
              <span style={{ fontSize: 11, color: open ? color + 'AA' : '#9ca3af', background: open ? color + '18' : '#f0f0f0', padding: '1px 7px', borderRadius: 10 }}>{items.length}</span>

    /* ─── SIGN UP ─── */
    function SignUpScreen({ onBack, onSignUp, onSignIn }) {
      const [step, setStep] = useState(1);
      const [firstName, setFirstName] = useState('');
      const [lastName, setLastName] = useState('');
      const [email, setEmail] = useState('');
      const [phone, setPhone] = useState('');
      const [pass, setPass] = useState('');
      const [confirmPass, setConfirmPass] = useState('');
      const [showPass, setShowPass] = useState(false);
      const [agree, setAgree] = useState(false);
      const [loading, setLoading] = useState(false);
      const [err, setErr] = useState('');

      function nextStep() {
        if (step === 1) {
          if (!firstName.trim()) { setErr('Enter your first name'); return; }
          if (!lastName.trim()) { setErr('Enter your last name'); return; }
          if (!email.includes('@')) { setErr('Enter a valid email'); return; }
          if (phone.length < 10) { setErr('Enter a valid phone number'); return; }
          setErr(''); setStep(2);
        } else {
          if (pass.length < 6) { setErr('Password must be at least 6 characters'); return; }
          if (pass !== confirmPass) { setErr('Passwords do not match'); return; }
          if (!agree) { setErr('Please accept the terms & conditions'); return; }
          setErr('');
          setLoading(true);
          setTimeout(() => { setLoading(false); onSignUp(); }, 1600);
        }
      }

      const strength = pass.length === 0 ? 0 : pass.length < 6 ? 1 : pass.length < 10 ? 2 : 3;
      const strengthColor = ['#e5e7eb','#DC2626','#F59E0B','#1D9E75'][strength];
      const strengthLabel = ['','Weak','Fair','Strong'][strength];

      return (
        <div style={{ minHeight: 780, display: 'flex', flexDirection: 'column', background: '#fff' }}>
          {/* Top banner */}
          <div style={{
            background: 'linear-gradient(160deg, #0A1E42 0%, #1A3A6E 100%)',

          }}>

            <button onClick={step === 1 ? onBack : () => { setStep(1); setErr(''); }} style={{ background: 'rgba(255,255,255,0.14)', border: '1px solid rgba(255,255,255,0.2)', color: '#fff', width: 36, height: 36, borderRadius: '50%', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>←</button>
            <div style={{ ...dmSerif, fontSize: 26, color: '#fff', lineHeight: 1.2 }}>{step === 1 ? 'Create your\naccount ✨' : 'Secure your\naccount 🔐'}</div>
            <div style={{ ...dmSans, fontSize: 13, color: 'rgba(255,255,255,0.6)', marginTop: 8 }}>Step {step} of 2</div>
            {/* Step indicator */}
            <div style={{ display: 'flex', gap: 6, marginTop: 16 }}>
              {[1,2].map(i => (
                <div key={i} style={{ height: 3, borderRadius: 2, flex: 1, background: i <= step ? '#fff' : 'rgba(255,255,255,0.25)', transition: 'background 0.4s' }} />
              ))}
            </div>
          </div>

          {/* Form */}
          <div style={{ flex: 1, padding: '28px 24px 40px', animation: 'fadeUp 0.4s ease both' }}>
            {err && (
              <div style={{ background: '#FEF2F2', border: '1px solid #fecaca', borderRadius: 12, padding: '10px 14px', fontSize: 13, color: '#DC2626', marginBottom: 16, ...dmSans }}>
                ⚠️ {err}
              </div>
            )}

            {step === 1 && (
              <>
                <div style={{ display: 'flex', gap: 12, marginBottom: 16 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>First Name</div>
                    <input className="auth-input" type="text" placeholder="John" value={firstName} onChange={e => setFirstName(e.target.value)} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>Last Name</div>
                    <input className="auth-input" type="text" placeholder="Doe" value={lastName} onChange={e => setLastName(e.target.value)} />
                  </div>
                </div>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>Email Address</div>

                </div>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>Phone Number</div>
                  <input className="auth-input" type="tel" placeholder="+234 800 000 0000" value={phone} onChange={e => setPhone(e.target.value)} />
                </div>
              </>
            )}

            {step === 2 && (
              <>
                <div style={{ marginBottom: 16 }}>
                  <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>Create Password</div>
                  <div style={{ position: 'relative' }}>
                    <input
                      className="auth-input"
                      type={showPass ? 'text' : 'password'}
                      placeholder="Min. 6 characters"
                      value={pass}
                      onChange={e => setPass(e.target.value)}
                      style={{ paddingRight: 44 }}
                    />
                    <span onClick={() => setShowPass(v => !v)} style={{ position: 'absolute', right: 14, top: '50%', transform: 'translateY(-50%)', cursor: 'pointer', fontSize: 16, color: '#9ca3af' }}>
                      {showPass ? '🙈' : '👁️'}
                    </span>
                  </div>
                  {pass.length > 0 && (
                    <div style={{ marginTop: 8 }}>
                      <div style={{ display: 'flex', gap: 4 }}>
                        {[1,2,3].map(i => (
                          <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, background: i <= strength ? strengthColor : '#e5e7eb', transition: 'background 0.3s' }} />

                    <div style={{ ...dmSans, fontSize: 11, color: '#DC2626', marginTop: 4 }}>Passwords don't match</div>

                  </div>
                  <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', lineHeight: 1.5 }}>

                  </div>
                </div>
              </>
            )}

            <button className="auth-btn-primary" onClick={nextStep} disabled={loading}>

            <div style={{ position: 'absolute', top: -30, right: -30, width: 160, height: 160, borderRadius: '50%', background: 'radial-gradient(circle, rgba(56,138,221,0.3) 0%, transparent 70%)' }} />
            <button onClick={onBack} style={{ background: 'rgba(255,255,255,0.14)', border: '1px solid rgba(255,255,255,0.2)', color: '#fff', width: 36, height: 36, borderRadius: '50%', cursor: 'pointer', fontSize: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>←</button>
            <div style={{ ...dmSerif, fontSize: 26, color: '#fff' }}>Reset your{'\n'}password 🔑</div>
            <div style={{ ...dmSans, fontSize: 13, color: 'rgba(255,255,255,0.6)', marginTop: 8 }}>We'll send a reset link to your email</div>
          </div>
          <div style={{ flex: 1, padding: '32px 24px', animation: 'fadeUp 0.45s ease both' }}>
            {sent ? (
              <div style={{ textAlign: 'center', animation: 'scaleIn 0.4s ease both', paddingTop: 40 }}>
                <div style={{ fontSize: 60, marginBottom: 20 }}>📬</div>
                <div style={{ ...dmSerif, fontSize: 22, color: '#111827', marginBottom: 8 }}>Email sent!</div>
                <div style={{ ...dmSans, fontSize: 14, color: '#6B7280' }}>Check your inbox for the reset link.</div>
              </div>
            ) : (
              <>
                <div style={{ marginBottom: 24 }}>
                  <div style={{ ...dmSans, fontSize: 13, color: '#6B7280', marginBottom: 6, fontWeight: 500 }}>Email Address</div>
                  <input className="auth-input" type="email" placeholder="john@example.com" value={email} onChange={e => setEmail(e.target.value)} />
                </div>
                <button className="auth-btn-primary" onClick={handleSend}>Send Reset Link</button>
                <button className="auth-btn-outline" onClick={onBack} style={{ marginTop: 12 }}>Back to Sign In</button>
              </>
            )}
          </div>
        </div>
      );
    }

    /* ═══════════════════════════════════════════════
       APP ROOT
       ═══════════════════════════════════════════════ */
    function App() {
      const [phase, setPhase] = useState('splash'); // splash | onboarding | signin | signup | forgot | app

      const phone = {
        maxWidth: 390, width: '100%', margin: '0 auto',
        background: '#fff', borderRadius: 32,
        border: '0.5px solid #c0c8da', overflow: 'hidden',
        minHeight: 780, position: 'relative',
        boxShadow: '0 20px 60px rgba(26,58,110,0.15)',
        display: 'flex', flexDirection: 'column'
      };

      if (phase === 'app') return <VMWBank />;

      return (
        <div style={{ background: '#dde3ef', display: 'flex', justifyContent: 'center', alignItems: 'flex-start', minHeight: '100vh', padding: 20 }}>
          <div style={phone}>
            {phase === 'splash'    && <SplashScreen onDone={() => setPhase('onboarding')} />}
            {phase === 'onboarding' && <OnboardingScreen onSignIn={() => setPhase('signin')} onGetStarted={() => setPhase('signup')} />}
            {phase === 'signin'    && <SignInScreen onBack={() => setPhase('onboarding')} onSignIn={() => setPhase('app')} onForgot={() => setPhase('forgot')} onSignUp={() => setPhase('signup')} />}
            {phase === 'signup'    && <SignUpScreen onBack={() => setPhase('onboarding')} onSignUp={() => setPhase('app')} onSignIn={() => setPhase('signin')} />}
            {phase === 'forgot'    && <ForgotPasswordScreen onBack={() => setPhase('signin')} onDone={() => setPhase('signin')} />}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
